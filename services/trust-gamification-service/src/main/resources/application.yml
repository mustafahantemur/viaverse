server:
  port: ${TRUST_GAMIFICATION_SERVICE_PORT:8108}

spring:
  application:
    name: trust-gamification-service
  datasource:
    url: ${TRUST_GAMIFICATION_SERVICE_DB_URL:jdbc:postgresql://localhost:5432/viaverse_trust_gamification}
    username: ${TRUST_GAMIFICATION_SERVICE_DB_USERNAME:viaverse}
    password: ${TRUST_GAMIFICATION_SERVICE_DB_PASSWORD:viaverse}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  structured:
    format:
      console: ecs
    ecs:
      service:
        name: ${spring.application.name}
        environment: ${VIAVERSE_ENV:local}
  level:
    app.viaverse: INFO

---
spring:
  config:
    activate:
      on-profile: local
logging:
  level:
    app.viaverse: DEBUG

---
server:
  port: 0
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: ${TRUST_GAMIFICATION_SERVICE_TEST_DB_URL:jdbc:postgresql://localhost:5432/viaverse_trust_gamification_test}
