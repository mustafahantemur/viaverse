server:
  port: ${NOTIFICATION_SERVICE_PORT:8106}

spring:
  application:
    name: notification-service
  datasource:
    url: ${NOTIFICATION_SERVICE_DB_URL:jdbc:postgresql://localhost:5432/viaverse_notification}
    username: ${NOTIFICATION_SERVICE_DB_USERNAME:viaverse}
    password: ${NOTIFICATION_SERVICE_DB_PASSWORD:viaverse}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  structured:
    format:
      console: ecs
  level:
    app.viaverse: INFO

---
spring:
  config:
    activate:
      on-profile: local
logging:
  level:
    app.viaverse: DEBUG

---
server:
  port: 0
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: ${NOTIFICATION_SERVICE_TEST_DB_URL:jdbc:postgresql://localhost:5432/viaverse_notification_test}
