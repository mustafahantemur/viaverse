server:
  port: ${IDENTITY_SERVICE_PORT:8101}

spring:
  application:
    name: identity-service
  cloud:
    stream:
      bindings:
        identityAccountEvents-out-0:
          destination: viaverse.identity.account-events
        identitySessionEvents-out-0:
          destination: viaverse.identity.session-events
      kafka:
        binder:
          brokers: ${IDENTITY_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  datasource:
    url: ${IDENTITY_SERVICE_DB_URL:jdbc:postgresql://localhost:5432/viaverse_identity}
    username: ${IDENTITY_SERVICE_DB_USERNAME:viaverse}
    password: ${IDENTITY_SERVICE_DB_PASSWORD:viaverse}
  data:
    redis:
      host: ${IDENTITY_VALKEY_HOST:localhost}
      port: ${IDENTITY_VALKEY_PORT:6379}
      database: ${IDENTITY_VALKEY_DB:0}
      # Fail fast under contention; the rate-limit adapter fails closed if
      # commands time out, so we'd rather error than hang requests.
      timeout: ${IDENTITY_VALKEY_COMMAND_TIMEOUT:1s}
      connect-timeout: ${IDENTITY_VALKEY_CONNECT_TIMEOUT:2s}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
    metrics:
      export:
        url: ${OTEL_EXPORTER_OTLP_ENDPOINT_METRICS:http://localhost:4318/v1/metrics}
  tracing:
    sampling:
      probability: ${OTEL_TRACES_SAMPLER_ARG:1.0}

logging:
  structured:
    format:
      console: ecs
    ecs:
      service:
        name: ${spring.application.name}
        environment: ${VIAVERSE_ENV:local}
  level:
    app.viaverse: INFO

viaverse:
  http:
    trusted-proxies: ${VIAVERSE_HTTP_TRUSTED_PROXIES:}
  auth:
    jwt:
      secret: ${IDENTITY_JWT_SECRET:}
      access-token-ttl: ${IDENTITY_JWT_ACCESS_TOKEN_TTL:PT15M}
    refresh-token-ttl: ${IDENTITY_REFRESH_TOKEN_TTL:P30D}
    otp:
      ttl: ${IDENTITY_OTP_TTL:PT5M}
      max-attempts: ${IDENTITY_OTP_MAX_ATTEMPTS:5}
      delivery:
        provider: ${VIAVERSE_OTP_DELIVERY_PROVIDER:debug}
    registration-token:
      ttl: ${IDENTITY_REGISTRATION_TOKEN_TTL:PT30M}
    sms:
      provider: ${VIAVERSE_SMS_PROVIDER:none}
      netgsm:
        endpoint: ${NETGSM_ENDPOINT:https://api.netgsm.com.tr/sms/send/get}
        username: ${NETGSM_USERNAME:}
        password: ${NETGSM_PASSWORD:}
        header: ${NETGSM_HEADER:}
        message-template: ${NETGSM_MESSAGE_TEMPLATE:Viaverse verification code: %s}
    social:
      google:
        enabled: ${VIAVERSE_SOCIAL_GOOGLE_ENABLED:false}
        client-id: ${GOOGLE_OAUTH_CLIENT_ID:}
      apple:
        enabled: ${VIAVERSE_SOCIAL_APPLE_ENABLED:false}
        client-id: ${APPLE_CLIENT_ID:}
    debug:
      enabled: ${VIAVERSE_AUTH_DEBUG_ENABLED:false}
      fixed-otp: ${VIAVERSE_AUTH_DEBUG_FIXED_OTP:}
      seed-test-users: ${VIAVERSE_AUTH_DEBUG_SEED_USERS:false}
    rate-limit:
      enabled: ${VIAVERSE_AUTH_RATE_LIMIT_ENABLED:true}
      auth-start:
        identifier-window-seconds: ${VIAVERSE_AUTH_START_IDENTIFIER_WINDOW_SECONDS:300}
        identifier-max-attempts: ${VIAVERSE_AUTH_START_IDENTIFIER_MAX_ATTEMPTS:3}
        ip-window-seconds: ${VIAVERSE_AUTH_START_IP_WINDOW_SECONDS:60}
        ip-max-attempts: ${VIAVERSE_AUTH_START_IP_MAX_ATTEMPTS:20}
      otp-verify:
        flow-window-seconds: ${VIAVERSE_AUTH_OTP_FLOW_WINDOW_SECONDS:300}
        flow-max-attempts: ${VIAVERSE_AUTH_OTP_FLOW_MAX_ATTEMPTS:5}
        ip-window-seconds: ${VIAVERSE_AUTH_OTP_IP_WINDOW_SECONDS:60}
        ip-max-attempts: ${VIAVERSE_AUTH_OTP_IP_MAX_ATTEMPTS:30}
      resend:
        cooldown-seconds: ${VIAVERSE_AUTH_OTP_RESEND_COOLDOWN_SECONDS:60}
      lockout:
        duration-seconds: ${VIAVERSE_AUTH_LOCKOUT_DURATION_SECONDS:900}
    consent:
      marketing-version: ${VIAVERSE_AUTH_CONSENT_MARKETING_VERSION:v1}

---
spring:
  config:
    activate:
      on-profile: local
logging:
  level:
    app.viaverse: DEBUG
viaverse:
  http:
    trusted-proxies: ${VIAVERSE_HTTP_TRUSTED_PROXIES:127.0.0.1,::1}
  auth:
    jwt:
      secret: ${IDENTITY_JWT_SECRET:local-dev-identity-jwt-secret-change-me}
    debug:
      enabled: ${VIAVERSE_AUTH_DEBUG_ENABLED:true}
      fixed-otp: ${VIAVERSE_AUTH_DEBUG_FIXED_OTP:111111}
      seed-test-users: ${VIAVERSE_AUTH_DEBUG_SEED_USERS:true}

---
server:
  port: 0
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: ${IDENTITY_SERVICE_TEST_DB_URL:jdbc:postgresql://localhost:5432/viaverse_identity_test}
viaverse:
  http:
    trusted-proxies: 127.0.0.1,::1
  auth:
    jwt:
      secret: ${IDENTITY_JWT_SECRET:test-identity-jwt-secret-change-me}
    debug:
      enabled: true
      fixed-otp: "111111"
      seed-test-users: true
    rate-limit:
      auth-start:
        identifier-window-seconds: 300
        identifier-max-attempts: 3
        ip-window-seconds: 60
        ip-max-attempts: 20
      otp-verify:
        flow-window-seconds: 300
        flow-max-attempts: 5
        ip-window-seconds: 60
        ip-max-attempts: 30
      resend:
        cooldown-seconds: 60
      lockout:
        duration-seconds: 900
