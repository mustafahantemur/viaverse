server:
  port: ${MEDIA_SERVICE_PORT:8105}

spring:
  application:
    name: media-service
  cloud:
    stream:
      bindings:
        mediaEvents-out-0:
          destination: viaverse.media.events.v1
          producer:
            useNativeEncoding: true
      kafka:
        binder:
          brokers: ${MEDIA_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
          required-acks: all
          producer-properties:
            enable.idempotence: true
            compression.type: lz4
            linger.ms: 5
            max.in.flight.requests.per.connection: 5
            key.serializer: org.apache.kafka.common.serialization.StringSerializer
            value.serializer: org.springframework.kafka.support.serializer.JsonSerializer
  datasource:
    url: ${MEDIA_SERVICE_DB_URL:jdbc:postgresql://localhost:5432/viaverse_media}
    username: ${MEDIA_SERVICE_DB_USERNAME:viaverse}
    password: ${MEDIA_SERVICE_DB_PASSWORD:viaverse}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  structured:
    format:
      console: ecs
    ecs:
      service:
        name: ${spring.application.name}
        environment: ${VIAVERSE_ENV:local}
  level:
    app.viaverse: INFO

viaverse:
  http:
    trusted-proxies: ${VIAVERSE_HTTP_TRUSTED_PROXIES:}
    cors:
      allowed-origins: ${VIAVERSE_HTTP_CORS_ALLOWED_ORIGINS:}
  outbox:
    poll-interval-ms: ${VIAVERSE_MEDIA_OUTBOX_POLL_INTERVAL_MS:2000}
    batch-size: ${VIAVERSE_MEDIA_OUTBOX_BATCH_SIZE:100}
    max-attempts: ${VIAVERSE_MEDIA_OUTBOX_MAX_ATTEMPTS:8}
  media:
    upload-session-ttl-minutes: ${VIAVERSE_MEDIA_UPLOAD_SESSION_TTL_MINUTES:15}
    security:
      jwt:
        secret: ${IDENTITY_JWT_SECRET:}
        previous-secrets: ${IDENTITY_JWT_PREVIOUS_SECRETS:}

object-storage:
  provider: ${OBJECT_STORAGE_PROVIDER:seaweedfs}
  endpoint: ${OBJECT_STORAGE_ENDPOINT:http://localhost:8333}
  region: ${OBJECT_STORAGE_REGION:local}
  access-key: ${OBJECT_STORAGE_ACCESS_KEY:viaverse}
  secret-key: ${OBJECT_STORAGE_SECRET_KEY:viaverse-local-secret}
  path-style-access: ${OBJECT_STORAGE_PATH_STYLE_ACCESS:true}
  buckets:
    media: ${OBJECT_STORAGE_BUCKET_MEDIA:viaverse-media-local}

---
spring:
  config:
    activate:
      on-profile: local
logging:
  level:
    app.viaverse: DEBUG
viaverse:
  http:
    trusted-proxies: ${VIAVERSE_HTTP_TRUSTED_PROXIES:127.0.0.1,::1}

---
server:
  port: 0
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: ${MEDIA_SERVICE_TEST_DB_URL:jdbc:postgresql://localhost:5432/viaverse_media_test}
viaverse:
  media:
    security:
      jwt:
        secret: ${IDENTITY_JWT_SECRET:test-identity-jwt-secret-change-me}
