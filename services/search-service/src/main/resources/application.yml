server:
  port: ${SEARCH_SERVICE_PORT:8107}

spring:
  application:
    name: search-service
  datasource:
    url: ${SEARCH_SERVICE_DB_URL:jdbc:postgresql://localhost:5432/viaverse_search}
    username: ${SEARCH_SERVICE_DB_USERNAME:viaverse}
    password: ${SEARCH_SERVICE_DB_PASSWORD:viaverse}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  structured:
    format:
      console: ecs
    ecs:
      service:
        name: ${spring.application.name}
        environment: ${VIAVERSE_ENV:local}
  level:
    app.viaverse: INFO

springdoc:
  api-docs:
    enabled: false
scalar:
  enabled: false
  telemetry: false

---
spring:
  config:
    activate:
      on-profile: local
logging:
  level:
    app.viaverse: DEBUG
springdoc:
  api-docs:
    enabled: true
scalar:
  enabled: true
  telemetry: false

---
server:
  port: 0
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: ${SEARCH_SERVICE_TEST_DB_URL:jdbc:postgresql://localhost:5432/viaverse_search_test}