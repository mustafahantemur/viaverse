server:
  port: ${WEB_BFF_PORT:8001}
  forward-headers-strategy: framework

spring:
  application:
    name: web-bff

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  structured:
    format:
      console: ecs
    ecs:
      service:
        name: ${spring.application.name}
        environment: ${VIAVERSE_ENV:local}
  level:
    app.viaverse: INFO

viaverse:
  bff:
    # Where to find each backing microservice. BFF makes server-to-server
    # HTTP calls; downstream paths and DTOs are owned by those services.
    identity-base-url: ${IDENTITY_SERVICE_BASE_URL:http://localhost:8101}
    profile-base-url: ${PROFILE_SERVICE_BASE_URL:http://localhost:8111}
    marketplace-base-url: ${MARKETPLACE_SERVICE_BASE_URL:http://localhost:8102}
    # Cookie domain/secure/sameSite controlled here so the deploy can flip
    # to .viaverse.app / Secure / Strict without code changes.
    refresh-cookie:
      name: ${VIAVERSE_BFF_REFRESH_COOKIE_NAME:viaverse_rt}
      domain: ${VIAVERSE_BFF_REFRESH_COOKIE_DOMAIN:}
      path: ${VIAVERSE_BFF_REFRESH_COOKIE_PATH:/api/auth}
      secure: ${VIAVERSE_BFF_REFRESH_COOKIE_SECURE:false}
      same-site: ${VIAVERSE_BFF_REFRESH_COOKIE_SAMESITE:Lax}
      max-age-days: ${VIAVERSE_BFF_REFRESH_COOKIE_MAX_AGE_DAYS:30}
    cors:
      allowed-origins: ${VIAVERSE_BFF_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:4000}

---
spring:
  config:
    activate:
      on-profile: local
logging:
  level:
    app.viaverse: DEBUG

---
server:
  port: 0
spring:
  config:
    activate:
      on-profile: test
