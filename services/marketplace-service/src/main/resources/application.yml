server:
  port: ${MARKETPLACE_SERVICE_PORT:8102}

spring:
  application:
    name: marketplace-service
  cloud:
    stream:
      bindings:
        marketplaceEvents-out-0:
          destination: viaverse.marketplace.events.v1
          producer:
            useNativeEncoding: true
      kafka:
        binder:
          brokers: ${MARKETPLACE_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
          required-acks: all
          producer-properties:
            enable.idempotence: true
            compression.type: lz4
            linger.ms: 5
            max.in.flight.requests.per.connection: 5
            key.serializer: org.apache.kafka.common.serialization.StringSerializer
            value.serializer: org.springframework.kafka.support.serializer.JsonSerializer
  datasource:
    url: ${MARKETPLACE_SERVICE_DB_URL:jdbc:postgresql://localhost:5432/viaverse_marketplace}
    username: ${MARKETPLACE_SERVICE_DB_USERNAME:viaverse}
    password: ${MARKETPLACE_SERVICE_DB_PASSWORD:viaverse}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  structured:
    format:
      console: ecs
    ecs:
      service:
        name: ${spring.application.name}
        environment: ${VIAVERSE_ENV:local}
  level:
    app.viaverse: INFO

viaverse:
  http:
    trusted-proxies: ${VIAVERSE_HTTP_TRUSTED_PROXIES:}
    cors:
      allowed-origins: ${VIAVERSE_HTTP_CORS_ALLOWED_ORIGINS:}
  outbox:
    poll-interval-ms: ${VIAVERSE_MARKETPLACE_OUTBOX_POLL_INTERVAL_MS:2000}
    batch-size: ${VIAVERSE_MARKETPLACE_OUTBOX_BATCH_SIZE:100}
    max-attempts: ${VIAVERSE_MARKETPLACE_OUTBOX_MAX_ATTEMPTS:8}
  marketplace:
    profile:
      base-url: ${PROFILE_SERVICE_BASE_URL:http://localhost:8111}
      internal-api-token: ${VIAVERSE_INTERNAL_API_TOKEN:local-dev-internal-token-change-me}
    security:
      jwt:
        secret: ${IDENTITY_JWT_SECRET:}
        previous-secrets: ${IDENTITY_JWT_PREVIOUS_SECRETS:}

---
spring:
  config:
    activate:
      on-profile: local
logging:
  level:
    app.viaverse: DEBUG
viaverse:
  http:
    trusted-proxies: ${VIAVERSE_HTTP_TRUSTED_PROXIES:127.0.0.1,::1}

---
server:
  port: 0
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: ${MARKETPLACE_SERVICE_TEST_DB_URL:jdbc:postgresql://localhost:5432/viaverse_marketplace_test}
viaverse:
  marketplace:
    security:
      jwt:
        secret: ${IDENTITY_JWT_SECRET:test-identity-jwt-secret-change-me}
