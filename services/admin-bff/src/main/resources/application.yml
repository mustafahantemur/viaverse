server:
  port: ${ADMIN_BFF_PORT:8110}

spring:
  application:
    name: admin-bff

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  structured:
    format:
      console: ecs
    ecs:
      service:
        name: ${spring.application.name}
        environment: ${VIAVERSE_ENV:local}
  level:
    app.viaverse: INFO

viaverse:
  admin-bff:
    profile-base-url: ${PROFILE_SERVICE_BASE_URL:http://localhost:8111}
    internal-api-token: ${VIAVERSE_INTERNAL_API_TOKEN:local-dev-internal-token-change-me}
    cors:
      allowed-origins: ${VIAVERSE_ADMIN_BFF_CORS_ALLOWED_ORIGINS:http://localhost:3001}

springdoc:
  api-docs:
    enabled: false
scalar:
  enabled: false
  telemetry: false

---
spring:
  config:
    activate:
      on-profile: local
logging:
  level:
    app.viaverse: DEBUG
springdoc:
  api-docs:
    enabled: true
scalar:
  enabled: true
  telemetry: false

---
server:
  port: 0
spring:
  config:
    activate:
      on-profile: test