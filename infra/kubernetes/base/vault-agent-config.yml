apiVersion: v1
kind: ConfigMap
metadata:
  name: viaverse-vault-agent-config
data:
  agent.hcl: |
    exit_after_auth = true
    pid_file = "/tmp/vault-agent.pid"

    vault {
      address = "http://vault:8200"
    }

    auto_auth {
      method "token_file" {
        config = {
          token_file_path = "/vault/token/token"
        }
      }

      sink "file" {
        config = {
          path = "/tmp/.vault-token"
        }
      }
    }

    template {
      source = "/vault/templates/runtime-env.ctmpl"
      destination = "/vault/secrets/runtime-env"
      perms = "0640"
    }

  runtime-env.ctmpl: |
    {{ with secret "viaverse/data/runtime" -}}
    export IDENTITY_SERVICE_BASE_URL={{ .Data.data.IDENTITY_SERVICE_BASE_URL | printf "%q" }}
    export PROFILE_SERVICE_BASE_URL={{ .Data.data.PROFILE_SERVICE_BASE_URL | printf "%q" }}
    export CONTENT_SERVICE_BASE_URL={{ .Data.data.CONTENT_SERVICE_BASE_URL | printf "%q" }}
    export MARKETPLACE_SERVICE_BASE_URL={{ .Data.data.MARKETPLACE_SERVICE_BASE_URL | printf "%q" }}
    export MEDIA_SERVICE_BASE_URL={{ .Data.data.MEDIA_SERVICE_BASE_URL | printf "%q" }}
    export NEXT_PUBLIC_BFF_BASE_URL={{ .Data.data.NEXT_PUBLIC_BFF_BASE_URL | printf "%q" }}
    export NEXT_PUBLIC_ADMIN_BFF_BASE_URL={{ .Data.data.NEXT_PUBLIC_ADMIN_BFF_BASE_URL | printf "%q" }}
    export NEXT_PUBLIC_MOCK_APP_BFF_BASE_URL={{ .Data.data.NEXT_PUBLIC_MOCK_APP_BFF_BASE_URL | printf "%q" }}
    export VIAVERSE_INTERNAL_API_TOKEN={{ .Data.data.VIAVERSE_INTERNAL_API_TOKEN | printf "%q" }}
    export IDENTITY_JWT_SECRET={{ .Data.data.IDENTITY_JWT_SECRET | printf "%q" }}
    export IDENTITY_JWT_PREVIOUS_SECRETS={{ .Data.data.IDENTITY_JWT_PREVIOUS_SECRETS | printf "%q" }}
    export IDENTITY_SERVICE_DB_URL={{ .Data.data.IDENTITY_SERVICE_DB_URL | printf "%q" }}
    export IDENTITY_SERVICE_DB_USERNAME={{ .Data.data.IDENTITY_SERVICE_DB_USERNAME | printf "%q" }}
    export IDENTITY_SERVICE_DB_PASSWORD={{ .Data.data.IDENTITY_SERVICE_DB_PASSWORD | printf "%q" }}
    export PROFILE_SERVICE_DB_URL={{ .Data.data.PROFILE_SERVICE_DB_URL | printf "%q" }}
    export PROFILE_SERVICE_DB_USERNAME={{ .Data.data.PROFILE_SERVICE_DB_USERNAME | printf "%q" }}
    export PROFILE_SERVICE_DB_PASSWORD={{ .Data.data.PROFILE_SERVICE_DB_PASSWORD | printf "%q" }}
    export CONTENT_SERVICE_DB_URL={{ .Data.data.CONTENT_SERVICE_DB_URL | printf "%q" }}
    export CONTENT_SERVICE_DB_USERNAME={{ .Data.data.CONTENT_SERVICE_DB_USERNAME | printf "%q" }}
    export CONTENT_SERVICE_DB_PASSWORD={{ .Data.data.CONTENT_SERVICE_DB_PASSWORD | printf "%q" }}
    export MARKETPLACE_SERVICE_DB_URL={{ .Data.data.MARKETPLACE_SERVICE_DB_URL | printf "%q" }}
    export MARKETPLACE_SERVICE_DB_USERNAME={{ .Data.data.MARKETPLACE_SERVICE_DB_USERNAME | printf "%q" }}
    export MARKETPLACE_SERVICE_DB_PASSWORD={{ .Data.data.MARKETPLACE_SERVICE_DB_PASSWORD | printf "%q" }}
    export PAYMENT_SERVICE_DB_URL={{ .Data.data.PAYMENT_SERVICE_DB_URL | printf "%q" }}
    export PAYMENT_SERVICE_DB_USERNAME={{ .Data.data.PAYMENT_SERVICE_DB_USERNAME | printf "%q" }}
    export PAYMENT_SERVICE_DB_PASSWORD={{ .Data.data.PAYMENT_SERVICE_DB_PASSWORD | printf "%q" }}
    export MESSAGING_SERVICE_DB_URL={{ .Data.data.MESSAGING_SERVICE_DB_URL | printf "%q" }}
