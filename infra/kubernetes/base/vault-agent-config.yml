    export MOCK_WEB_BFF_DB_PASSWORD={{ .Data.data.MOCK_WEB_BFF_DB_PASSWORD | printf "%q" }}
    export IDENTITY_KAFKA_BOOTSTRAP_SERVERS={{ .Data.data.IDENTITY_KAFKA_BOOTSTRAP_SERVERS | printf "%q" }}
    export PROFILE_KAFKA_BOOTSTRAP_SERVERS={{ .Data.data.PROFILE_KAFKA_BOOTSTRAP_SERVERS | printf "%q" }}
    export CONTENT_KAFKA_BOOTSTRAP_SERVERS={{ .Data.data.CONTENT_KAFKA_BOOTSTRAP_SERVERS | printf "%q" }}
    export MARKETPLACE_KAFKA_BOOTSTRAP_SERVERS={{ .Data.data.MARKETPLACE_KAFKA_BOOTSTRAP_SERVERS | printf "%q" }}
    export MEDIA_KAFKA_BOOTSTRAP_SERVERS={{ .Data.data.MEDIA_KAFKA_BOOTSTRAP_SERVERS | printf "%q" }}
    export TRUST_GAMIFICATION_KAFKA_BOOTSTRAP_SERVERS={{ .Data.data.TRUST_GAMIFICATION_KAFKA_BOOTSTRAP_SERVERS | printf "%q" }}
    export IDENTITY_VALKEY_HOST={{ .Data.data.IDENTITY_VALKEY_HOST | printf "%q" }}
