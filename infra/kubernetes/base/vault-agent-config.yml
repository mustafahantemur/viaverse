    export OBJECT_STORAGE_PATH_STYLE_ACCESS={{ .Data.data.OBJECT_STORAGE_PATH_STYLE_ACCESS | printf "%q" }}
    export OBJECT_STORAGE_BUCKET_MEDIA={{ .Data.data.OBJECT_STORAGE_BUCKET_MEDIA | printf "%q" }}
    export SMTP_HOST={{ .Data.data.SMTP_HOST | printf "%q" }}
    export SMTP_PORT={{ .Data.data.SMTP_PORT | printf "%q" }}
    export SMTP_USERNAME={{ .Data.data.SMTP_USERNAME | printf "%q" }}
    export SMTP_PASSWORD={{ .Data.data.SMTP_PASSWORD | printf "%q" }}
    export SMTP_FROM_ADDRESS={{ .Data.data.SMTP_FROM_ADDRESS | printf "%q" }}
    export SMTP_AUTH_ENABLED={{ .Data.data.SMTP_AUTH_ENABLED | printf "%q" }}
    export SMTP_STARTTLS_ENABLED={{ .Data.data.SMTP_STARTTLS_ENABLED | printf "%q" }}
    export NETGSM_ENDPOINT={{ .Data.data.NETGSM_ENDPOINT | printf "%q" }}
    export NETGSM_USERNAME={{ .Data.data.NETGSM_USERNAME | printf "%q" }}
    export NETGSM_PASSWORD={{ .Data.data.NETGSM_PASSWORD | printf "%q" }}
    export NETGSM_HEADER={{ .Data.data.NETGSM_HEADER | printf "%q" }}
    export GOOGLE_OAUTH_CLIENT_ID={{ .Data.data.GOOGLE_OAUTH_CLIENT_ID | printf "%q" }}
    export APPLE_CLIENT_ID={{ .Data.data.APPLE_CLIENT_ID | printf "%q" }}
    export OTEL_EXPORTER_OTLP_ENDPOINT={{ .Data.data.OTEL_EXPORTER_OTLP_ENDPOINT | printf "%q" }}
