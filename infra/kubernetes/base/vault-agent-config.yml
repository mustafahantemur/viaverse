    export MEDIA_SERVICE_DB_URL={{ .Data.data.MEDIA_SERVICE_DB_URL | printf "%q" }}
    export MEDIA_SERVICE_DB_USERNAME={{ .Data.data.MEDIA_SERVICE_DB_USERNAME | printf "%q" }}
    export MEDIA_SERVICE_DB_PASSWORD={{ .Data.data.MEDIA_SERVICE_DB_PASSWORD | printf "%q" }}
    export NOTIFICATION_SERVICE_DB_URL={{ .Data.data.NOTIFICATION_SERVICE_DB_URL | printf "%q" }}
    export NOTIFICATION_SERVICE_DB_USERNAME={{ .Data.data.NOTIFICATION_SERVICE_DB_USERNAME | printf "%q" }}
    export NOTIFICATION_SERVICE_DB_PASSWORD={{ .Data.data.NOTIFICATION_SERVICE_DB_PASSWORD | printf "%q" }}
    export SEARCH_SERVICE_DB_URL={{ .Data.data.SEARCH_SERVICE_DB_URL | printf "%q" }}
    export SEARCH_SERVICE_DB_USERNAME={{ .Data.data.SEARCH_SERVICE_DB_USERNAME | printf "%q" }}
    export SEARCH_SERVICE_DB_PASSWORD={{ .Data.data.SEARCH_SERVICE_DB_PASSWORD | printf "%q" }}
    export TRUST_GAMIFICATION_SERVICE_DB_URL={{ .Data.data.TRUST_GAMIFICATION_SERVICE_DB_URL | printf "%q" }}
