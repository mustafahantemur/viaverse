apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: identity-service
  template:
    metadata:
      labels:
        app: identity-service
    spec:
      containers:
        - name: identity-service
          image: viaverse/identity-service:local
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: viaverse-local-config
          ports:
            - containerPort: 8101
---
apiVersion: v1
kind: Service
metadata:
  name: identity-service
spec:
  type: ClusterIP
  selector:
    app: identity-service
  ports:
    - port: 8101
      targetPort: 8101
---
