[SERVICE]
    Flush         1
    Log_Level     info
    Parsers_File  /fluent-bit/etc/parsers.conf

[INPUT]
    Name              tail
    Path              /var/lib/docker/containers/*/*.log
    Parser            docker
    Tag               docker.*
    DB                /fluent-bit/state/docker-containers.db
    Mem_Buf_Limit     20MB
    Skip_Long_Lines   On
    Refresh_Interval  5

[FILTER]
    Name          parser
    Match         docker.*
    Key_Name      log
    Parser        ecs_json
    Reserve_Data  On
    Preserve_Key  Off

[FILTER]
    Name   modify
    Match  docker.*
    Add    deployment.environment ${VIAVERSE_ENV}

[FILTER]
    Name    grep
    Match   docker.*
    Regex   $service['name'] ^.+$

[OUTPUT]
    Name                opensearch
    Match               docker.*
    Host                opensearch
    Port                9200
    Index               viaverse-logs-local
    Suppress_Type_Name  On
    Generate_ID         On
