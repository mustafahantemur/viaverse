receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
processors:
  batch:
  resource/viaverse_local:
    attributes:
      - key: deployment.environment
        value: ${env:VIAVERSE_ENV}
        action: upsert
      - key: service.namespace
        value: viaverse
        action: upsert

exporters:
  debug:
    verbosity: basic
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [resource/viaverse_local, batch]
      exporters: [otlp/jaeger, debug]
    metrics:
      receivers: [otlp]
      processors: [resource/viaverse_local, batch]
      exporters: [debug]
