<!doctype html>
<html><head><meta charset="utf-8"/><title>Components — Profile Stats</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:var(--vv-bg);font-family:var(--vv-font-sans);color:var(--vv-fg);}
  .wrap{padding:18px 24px;display:flex;gap:8px;}
  .stat{flex:1;background:var(--vv-surface);border:1px solid var(--vv-border-subtle);border-radius:14px;padding:14px 8px;text-align:center;}
  .n{font-family:var(--vv-font-display);font-size:24px;font-weight:800;color:var(--vv-fg-strong);letter-spacing:-0.02em;line-height:1;}
  .n.green{color:#10B981;}
  .l{font-size:10px;color:var(--vv-fg-muted);margin-top:6px;font-weight:600;line-height:1.3;}
</style></head>
<body><div class="wrap">
  <div class="stat"><div class="n">12</div><div class="l">Açtığı<br>Paylaşım</div></div>
  <div class="stat"><div class="n">47</div><div class="l">Tamamlanan<br>İş</div></div>
  <div class="stat"><div class="n">8</div><div class="l">Yardım<br>Talebi</div></div>
  <div class="stat"><div class="n green">%94</div><div class="l">Yanıt<br>Oranı</div></div>
</div></body></html>
