<!doctype html>
<html><head><meta charset="utf-8"/><title>Components — Bottom Nav</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:var(--vv-bg);font-family:var(--vv-font-sans);color:var(--vv-fg);}
  .wrap{padding:20px 24px;}
  .nav{position:relative;background:var(--vv-surface);height:80px;border-radius:16px;display:flex;align-items:center;justify-content:space-around;padding:0 16px;box-shadow:var(--vv-shadow-nav), 0 1px 3px rgba(15,23,42,.06);}
  .tab{display:flex;flex-direction:column;align-items:center;gap:4px;width:64px;opacity:.4;cursor:pointer;}
  .tab.active{opacity:1;}
  .tab svg{width:22px;height:22px;color:var(--vv-fg);}
  .tab.active svg{color:var(--vv-primary);}
  .tab .label{font-size:10px;font-weight:700;letter-spacing:-0.02em;}
  .tab.active .label{color:var(--vv-primary);}
  .badge{position:absolute;top:-4px;right:-4px;background:var(--vv-primary);color:var(--vv-primary-foreground);font-size:9px;font-weight:800;width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid var(--vv-surface);}
  .ico-wrap{position:relative;}
  .fab{margin-top:-26px;width:56px;height:56px;border-radius:50%;background:var(--vv-primary);box-shadow:0 8px 20px rgba(249,115,22,.3);border:4px solid var(--vv-surface);display:flex;align-items:center;justify-content:center;}
  .fab img{width:34px;height:34px;}
  .fab-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;}
</style></head>
<body><div class="wrap">
  <div class="nav">
    <div class="tab active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
        <circle cx="12" cy="10" r="3"/>
      </svg>
      <span class="label">Nearby</span>
    </div>
    <div class="tab">
      <div class="ico-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 12h-6l-2 3h-4l-2-3H2"/>
          <path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/>
        </svg>
        <span class="badge">3</span>
      </div>
      <span class="label">Activity</span>
    </div>
    <div class="fab-wrap">
      <div class="fab"><img src="../assets/viaverse_icon_silver_green.png" alt=""/></div>
      <span class="label" style="font-size:10px;font-weight:700;color:var(--vv-fg);">Share</span>
    </div>
    <div class="tab">
      <div class="ico-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
        </svg>
        <span class="badge">2</span>
      </div>
      <span class="label">Chats</span>
    </div>
    <div class="tab">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 21v-1a8 8 0 0 1 16 0v1"/>
      </svg>
      <span class="label">Me</span>
    </div>
  </div>
</div></body></html>
