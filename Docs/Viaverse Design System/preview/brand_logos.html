<!doctype html>
<html><head><meta charset="utf-8"/><title>Brand — Logo lockups</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:var(--vv-bg);font-family:var(--vv-font-sans);color:var(--vv-fg);}
  .wrap{padding:20px 24px;display:grid;grid-template-columns:auto auto auto;gap:24px;align-items:end;}
  .item{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .item img{height:80px;object-fit:contain;}
  .lbl{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--vv-fg-muted);font-weight:700;}
  .on-orange{
    background:var(--vv-primary);
    width:96px;height:96px;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    box-shadow:var(--vv-shadow-cta);
  }
  .on-orange img{width:78px;height:78px;object-fit:contain;}
</style></head>
<body><div class="wrap">
  <div class="item">
    <img src="../assets/viaverse_icon.png" alt=""/>
    <div class="lbl">V mark · clay</div>
  </div>
  <div class="item">
    <img src="../assets/viaverse_wordmark.png" alt="" style="height:50px;"/>
    <div class="lbl">Wordmark</div>
  </div>
  <div class="item">
    <div class="on-orange"><img src="../assets/viaverse_icon_silver_green.png" alt=""/></div>
    <div class="lbl">V on orange · nav FAB</div>
  </div>
</div></body></html>
