<!doctype html>
<html><head><meta charset="utf-8"/><title>Components — Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:var(--vv-bg);font-family:var(--vv-font-sans);color:var(--vv-fg);}
  .card{padding:22px 24px;display:flex;flex-direction:column;gap:14px;}
  .row{display:flex;gap:10px;align-items:center;}
  .btn{height:44px;padding:0 22px;border-radius:14px;font-size:13px;font-weight:700;letter-spacing:-0.01em;border:none;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;}
  .pri{background:var(--vv-primary);color:var(--vv-primary-foreground);box-shadow:var(--vv-shadow-cta);}
  .pri-hover{background:var(--vv-primary-hover);color:var(--vv-primary-foreground);}
  .pri-disabled{background:var(--vv-surface-muted);color:var(--vv-fg-faint);opacity:.7;}
  .neutral{background:var(--vv-surface);color:var(--vv-fg);box-shadow:inset 0 0 0 1px var(--vv-border-muted);}
  .ghost{background:transparent;color:var(--vv-fg-muted);}
  .pill{height:36px;padding:0 16px;border-radius:999px;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:6px;border:1px solid var(--vv-border-subtle);background:var(--vv-surface);color:var(--vv-fg-muted);cursor:pointer;}
  .pill.active{background:var(--vv-primary);color:var(--vv-primary-foreground);border-color:var(--vv-primary);box-shadow:var(--vv-shadow-cta);}
  .lbl{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--vv-fg-muted);font-weight:700;width:84px;}
</style></head>
<body><div class="card">
  <div class="row"><div class="lbl">Primary</div><button class="btn pri">Hizmet vermeye başla</button><button class="btn pri-hover">hover</button><button class="btn pri-disabled" disabled>disabled</button></div>
  <div class="row"><div class="lbl">Neutral</div><button class="btn neutral">Mesaj Gönder</button><button class="btn ghost">Şimdilik geç</button></div>
  <div class="row"><div class="lbl">Pill chips</div><button class="pill active">Tümü</button><button class="pill">Duyuru</button><button class="pill">Yardım</button><button class="pill">İş</button></div>
</div></body></html>
