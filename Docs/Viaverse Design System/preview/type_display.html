<!doctype html>
<html><head><meta charset="utf-8"/><title>Type — Display</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:var(--vv-bg);font-family:var(--vv-font-sans);color:var(--vv-fg);}
  .card{padding:24px 28px;display:flex;flex-direction:column;gap:14px;}
  .row{display:flex;align-items:baseline;gap:18px;}
  .label{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--vv-fg-muted);font-weight:700;width:88px;flex-shrink:0;}
  .specimen{color:var(--vv-fg-strong);letter-spacing:-0.02em;line-height:1.05;}
  .h1{font-size:40px;font-weight:800;}
  .h2{font-size:28px;font-weight:800;}
  .h3{font-size:20px;font-weight:700;}
  .title{font-size:16px;font-weight:700;color:var(--vv-fg);}
</style></head>
<body><div class="card">
  <div class="row"><div class="label">H1 · 800</div><div class="specimen h1">Hizmet vermeye başla</div></div>
  <div class="row"><div class="label">H2 · 800</div><div class="specimen h2">Hangi hizmete ihtiyacın var?</div></div>
  <div class="row"><div class="label">H3 · 700</div><div class="specimen h3">Doğrulama Kodu</div></div>
  <div class="row"><div class="label">Title · 700</div><div class="title">Profili oluştur</div></div>
</div></body></html>
