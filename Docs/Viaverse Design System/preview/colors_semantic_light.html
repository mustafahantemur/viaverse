<!doctype html>
<html><head><meta charset="utf-8"/><title>Colors — Semantic Light</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:var(--vv-bg);font-family:var(--vv-font-sans);color:var(--vv-fg);}
  .card{padding:20px 24px;display:grid;grid-template-columns:1fr 1fr;gap:10px 14px;}
  .row{display:flex;align-items:center;gap:10px;}
  .chip{width:36px;height:36px;border-radius:10px;flex-shrink:0;box-shadow:inset 0 0 0 1px var(--vv-border-muted);}
  .name{font-size:11px;font-weight:700;color:var(--vv-fg);}
  .var{font-size:9px;color:var(--vv-fg-muted);font-family:var(--vv-font-mono);}
</style></head>
<body><div class="card">
  <div class="row"><div class="chip" style="background:var(--vv-bg)"></div><div><div class="name">page bg</div><div class="var">--vv-bg</div></div></div>
  <div class="row"><div class="chip" style="background:var(--vv-surface)"></div><div><div class="name">surface</div><div class="var">--vv-surface</div></div></div>
  <div class="row"><div class="chip" style="background:var(--vv-surface-muted)"></div><div><div class="name">surface-muted</div><div class="var">--vv-surface-muted</div></div></div>
  <div class="row"><div class="chip" style="background:var(--vv-surface-hover)"></div><div><div class="name">surface-hover</div><div class="var">--vv-surface-hover</div></div></div>
  <div class="row"><div class="chip" style="background:var(--vv-fg)"></div><div><div class="name">fg · primary</div><div class="var">--vv-fg</div></div></div>
  <div class="row"><div class="chip" style="background:var(--vv-fg-strong)"></div><div><div class="name">fg-strong</div><div class="var">--vv-fg-strong</div></div></div>
  <div class="row"><div class="chip" style="background:var(--vv-fg-muted)"></div><div><div class="name">fg-muted</div><div class="var">--vv-fg-muted</div></div></div>
  <div class="row"><div class="chip" style="background:var(--vv-fg-faint)"></div><div><div class="name">fg-faint</div><div class="var">--vv-fg-faint</div></div></div>
  <div class="row"><div class="chip" style="background:var(--vv-primary)"></div><div><div class="name">primary · CTA</div><div class="var">--vv-primary</div></div></div>
  <div class="row"><div class="chip" style="background:var(--vv-primary-hover)"></div><div><div class="name">primary-hover</div><div class="var">--vv-primary-hover</div></div></div>
  <div class="row"><div class="chip" style="background:var(--vv-trust)"></div><div><div class="name">trust</div><div class="var">--vv-trust</div></div></div>
  <div class="row"><div class="chip" style="background:var(--vv-trust-deep)"></div><div><div class="name">trust-deep</div><div class="var">--vv-trust-deep</div></div></div>
</div></body></html>
