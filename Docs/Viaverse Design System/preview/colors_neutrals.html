<!doctype html>
<html><head><meta charset="utf-8"/><title>Colors — Ink & Ivory</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:var(--vv-bg);font-family:var(--vv-font-sans);color:var(--vv-fg);}
  .card{padding:20px 24px;}
  .group-label{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--vv-fg-muted);font-weight:700;margin-bottom:8px;}
  .scale{display:flex;gap:6px;margin-bottom:14px;}
  .sw{flex:1;height:54px;border-radius:10px;display:flex;flex-direction:column;justify-content:flex-end;padding:6px 8px;color:#fff;font-size:9px;font-weight:700;box-shadow:inset 0 0 0 1px rgba(15,23,42,0.04);}
  .sw .v{opacity:.85;font-weight:600;font-size:8px;}
  .light{color:var(--vv-fg-strong);}
</style></head>
<body><div class="card">
  <div class="group-label">Ink · text & deep neutrals</div>
  <div class="scale">
    <div class="sw light" style="background:#F9FAFB">50<div class="v">F9FAFB</div></div>
    <div class="sw light" style="background:#F3F4F6">100<div class="v">F3F4F6</div></div>
    <div class="sw light" style="background:#E5E7EB">200<div class="v">E5E7EB</div></div>
    <div class="sw light" style="background:#D1D5DB">300<div class="v">D1D5DB</div></div>
    <div class="sw" style="background:#9CA3AF">400<div class="v">9CA3AF</div></div>
    <div class="sw" style="background:#6B7280">500<div class="v">6B7280</div></div>
    <div class="sw" style="background:#374151">700<div class="v">374151</div></div>
    <div class="sw" style="background:#0F172A">900<div class="v">0F172A</div></div>
  </div>
  <div class="group-label">Warm Ivory · canvas</div>
  <div class="scale">
    <div class="sw light" style="background:#FFFBF5">50<div class="v">FFFBF5</div></div>
    <div class="sw light" style="background:#FFF7ED">100<div class="v">FFF7ED</div></div>
    <div class="sw light" style="background:#F4ECE0">page bg<div class="v">F4ECE0</div></div>
    <div class="sw light" style="background:#FCEFD9">200<div class="v">FCEFD9</div></div>
    <div class="sw light" style="background:#F5EFE5">muted<div class="v">F5EFE5</div></div>
  </div>
</div></body></html>
