<!doctype html>
<html><head><meta charset="utf-8"/><title>Colors — Category Tints</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:var(--vv-bg);font-family:var(--vv-font-sans);color:var(--vv-fg);}
  .card{padding:18px 24px;display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
  .cat{display:flex;flex-direction:column;align-items:center;gap:6px;padding:10px 6px;border-radius:12px;}
  .dot{width:24px;height:24px;border-radius:8px;display:flex;align-items:center;justify-content:center;}
  .dot svg{width:14px;height:14px;}
  .lbl{font-size:9px;font-weight:700;color:var(--vv-fg);text-align:center;line-height:1.2;}
  .hex{font-size:8px;font-family:var(--vv-font-mono);color:var(--vv-fg-muted);}
</style></head>
<body><div class="card">
  <div class="cat" style="background:rgba(245,158,11,.1)"><div class="dot" style="background:#F59E0B"></div><div class="lbl">Home</div><div class="hex">F59E0B</div></div>
  <div class="cat" style="background:rgba(59,130,246,.1)"><div class="dot" style="background:#3B82F6"></div><div class="lbl">Digital</div><div class="hex">3B82F6</div></div>
  <div class="cat" style="background:rgba(168,85,247,.1)"><div class="dot" style="background:#A855F7"></div><div class="lbl">Creative</div><div class="hex">A855F7</div></div>
  <div class="cat" style="background:rgba(99,102,241,.1)"><div class="dot" style="background:#6366F1"></div><div class="lbl">Education</div><div class="hex">6366F1</div></div>
  <div class="cat" style="background:rgba(6,182,212,.1)"><div class="dot" style="background:#06B6D4"></div><div class="lbl">Cleaning</div><div class="hex">06B6D4</div></div>
  <div class="cat" style="background:rgba(16,185,129,.1)"><div class="dot" style="background:#10B981"></div><div class="lbl">Logistics</div><div class="hex">10B981</div></div>
  <div class="cat" style="background:rgba(244,63,94,.1)"><div class="dot" style="background:#F43F5E"></div><div class="lbl">Care</div><div class="hex">F43F5E</div></div>
  <div class="cat" style="background:rgba(100,116,139,.1)"><div class="dot" style="background:#64748B"></div><div class="lbl">Pro</div><div class="hex">64748B</div></div>
  <div class="cat" style="background:rgba(249,115,22,.1)"><div class="dot" style="background:#F97316"></div><div class="lbl">Pets</div><div class="hex">F97316</div></div>
  <div class="cat" style="background:rgba(236,72,153,.1)"><div class="dot" style="background:#EC4899"></div><div class="lbl">Events</div><div class="hex">EC4899</div></div>
</div></body></html>
