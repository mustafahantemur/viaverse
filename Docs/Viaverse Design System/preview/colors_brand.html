<!doctype html>
<html><head><meta charset="utf-8"/><title>Colors — Brand Primitives</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:var(--vv-bg);font-family:var(--vv-font-sans);color:var(--vv-fg);}
  .card{padding:20px 24px;}
  .group-label{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--vv-fg-muted);font-weight:700;margin-bottom:8px;}
  .scale{display:flex;gap:6px;margin-bottom:14px;}
  .sw{flex:1;height:54px;border-radius:10px;display:flex;flex-direction:column;justify-content:flex-end;padding:6px 8px;color:#fff;font-size:9px;font-weight:700;letter-spacing:-0.01em;box-shadow:inset 0 0 0 1px rgba(15,23,42,0.04);}
  .sw .v{opacity:.85;font-weight:600;font-size:8px;}
  .light{color:var(--vv-fg-strong);}
</style></head>
<body><div class="card">
  <div class="group-label">Orange · primary action</div>
  <div class="scale">
    <div class="sw light" style="background:#FFF7ED">50<div class="v">FFF7ED</div></div>
    <div class="sw light" style="background:#FFEDD5">100<div class="v">FFEDD5</div></div>
    <div class="sw light" style="background:#FED7AA">200<div class="v">FED7AA</div></div>
    <div class="sw" style="background:#FDBA74">300<div class="v">FDBA74</div></div>
    <div class="sw" style="background:#FB923C">400<div class="v">FB923C</div></div>
    <div class="sw" style="background:#F97316;box-shadow:0 8px 20px rgba(249,115,22,.25);">500<div class="v">F97316</div></div>
    <div class="sw" style="background:#EA580C">600<div class="v">EA580C</div></div>
    <div class="sw" style="background:#C2410C">700<div class="v">C2410C</div></div>
  </div>
  <div class="group-label">Green · trust + dark mode</div>
  <div class="scale">
    <div class="sw light" style="background:#ECFDF5">50<div class="v">ECFDF5</div></div>
    <div class="sw light" style="background:#D1FAE5">100<div class="v">D1FAE5</div></div>
    <div class="sw light" style="background:#A7F3D0">200<div class="v">A7F3D0</div></div>
    <div class="sw" style="background:#34D399">400<div class="v">34D399</div></div>
    <div class="sw" style="background:#10B981">500<div class="v">10B981</div></div>
    <div class="sw" style="background:#059669">600<div class="v">059669</div></div>
    <div class="sw" style="background:#064E3B">900<div class="v">064E3B</div></div>
    <div class="sw" style="background:#022C22">950<div class="v">022C22</div></div>
  </div>
</div></body></html>
