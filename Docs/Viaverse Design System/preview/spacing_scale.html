<!doctype html>
<html><head><meta charset="utf-8"/><title>Spacing — Scale</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:var(--vv-bg);font-family:var(--vv-font-sans);color:var(--vv-fg);}
  .card{padding:20px 24px;display:flex;flex-direction:column;gap:8px;}
  .row{display:flex;align-items:center;gap:14px;height:18px;}
  .lbl{font-size:10px;font-weight:700;color:var(--vv-fg);width:60px;font-family:var(--vv-font-mono);}
  .bar{background:var(--vv-primary);height:14px;border-radius:3px;}
  .hex{font-size:9px;color:var(--vv-fg-muted);font-family:var(--vv-font-mono);}
</style></head>
<body><div class="card">
  <div class="row"><div class="lbl">1 · 4</div><div class="bar" style="width:4px"></div><div class="hex">stitch / icon padding</div></div>
  <div class="row"><div class="lbl">2 · 8</div><div class="bar" style="width:8px"></div><div class="hex">chip-row gap</div></div>
  <div class="row"><div class="lbl">3 · 12</div><div class="bar" style="width:12px"></div><div class="hex">card inner gap</div></div>
  <div class="row"><div class="lbl">4 · 16</div><div class="bar" style="width:16px"></div><div class="hex">screen edge padding</div></div>
  <div class="row"><div class="lbl">5 · 20</div><div class="bar" style="width:20px"></div><div class="hex">section gap</div></div>
  <div class="row"><div class="lbl">6 · 24</div><div class="bar" style="width:24px"></div><div class="hex">card padding</div></div>
  <div class="row"><div class="lbl">8 · 32</div><div class="bar" style="width:32px"></div><div class="hex">heading gap</div></div>
  <div class="row"><div class="lbl">12 · 48</div><div class="bar" style="width:48px"></div><div class="hex">hero spacing</div></div>
</div></body></html>
