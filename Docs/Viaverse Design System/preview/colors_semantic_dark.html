<!doctype html>
<html><head><meta charset="utf-8"/><title>Colors — Semantic Dark</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html{background:#022C22;}
  body{margin:0;background:#022C22;font-family:var(--vv-font-sans);color:#E5E7EB;}
  .card{padding:20px 24px;display:grid;grid-template-columns:1fr 1fr;gap:10px 14px;}
  .row{display:flex;align-items:center;gap:10px;}
  .chip{width:36px;height:36px;border-radius:10px;flex-shrink:0;box-shadow:inset 0 0 0 1px rgba(255,251,245,.1);}
  .name{font-size:11px;font-weight:700;color:#FFFBF5;}
  .var{font-size:9px;color:#9CA3AF;font-family:var(--vv-font-mono);}
</style></head>
<body><div class="card">
  <div class="row"><div class="chip" style="background:#022C22"></div><div><div class="name">page bg</div><div class="var">--vv-bg</div></div></div>
  <div class="row"><div class="chip" style="background:#052E2B"></div><div><div class="name">surface</div><div class="var">--vv-surface</div></div></div>
  <div class="row"><div class="chip" style="background:#0A3A33"></div><div><div class="name">surface-muted</div><div class="var">--vv-surface-muted</div></div></div>
  <div class="row"><div class="chip" style="background:#0F4A40"></div><div><div class="name">surface-hover</div><div class="var">--vv-surface-hover</div></div></div>
  <div class="row"><div class="chip" style="background:#E5E7EB"></div><div><div class="name">fg</div><div class="var">--vv-fg</div></div></div>
  <div class="row"><div class="chip" style="background:#FFFBF5"></div><div><div class="name">fg-strong</div><div class="var">--vv-fg-strong</div></div></div>
  <div class="row"><div class="chip" style="background:#9CA3AF"></div><div><div class="name">fg-muted</div><div class="var">--vv-fg-muted</div></div></div>
  <div class="row"><div class="chip" style="background:#6B7280"></div><div><div class="name">fg-faint</div><div class="var">--vv-fg-faint</div></div></div>
  <div class="row"><div class="chip" style="background:#F97316"></div><div><div class="name">primary · CTA</div><div class="var">--vv-primary</div></div></div>
  <div class="row"><div class="chip" style="background:#10B981"></div><div><div class="name">trust</div><div class="var">--vv-trust</div></div></div>
</div></body></html>
