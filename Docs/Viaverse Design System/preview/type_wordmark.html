<!doctype html>
<html><head><meta charset="utf-8"/><title>Type — Wordmark</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:var(--vv-bg);font-family:var(--vv-font-sans);color:var(--vv-fg);height:100%;}
  .card{padding:32px;display:flex;flex-direction:column;gap:20px;align-items:flex-start;}
  .wm{font-family:var(--vv-font-wordmark);font-weight:300;font-stretch:90%;letter-spacing:0.06em;font-size:64px;line-height:1;}
  .wm .o{color:var(--vv-primary);}
  .wm .g{color:var(--vv-trust-deep);}
  .meta{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--vv-fg-muted);font-weight:700;}
</style></head>
<body><div class="card">
  <div class="wm"><span class="o">v</span><span class="g">ia</span><span class="o">v</span><span class="g">erse</span></div>
  <div class="meta">Open Sans · 300 · width 90% · tracking 0.06em · split-color v's</div>
</div></body></html>
