<!doctype html>
<html><head><meta charset="utf-8"/><title>Brand — Category Illustrations</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:var(--vv-bg);font-family:var(--vv-font-sans);color:var(--vv-fg);}
  .wrap{padding:18px 24px;display:grid;grid-template-columns:repeat(8,1fr);gap:10px;}
  .cat{display:flex;flex-direction:column;align-items:center;gap:4px;}
  .ico{width:56px;height:56px;display:flex;align-items:center;justify-content:center;border-radius:14px;background:rgba(15,23,42,.02);}
  .ico img{width:48px;height:48px;object-fit:contain;}
  .lbl{font-size:8px;font-weight:600;color:var(--vv-fg-muted);text-align:center;line-height:1.2;}
</style></head>
<body><div class="wrap">
  <div class="cat"><div class="ico"><img src="../assets/categories/home_repair.png"/></div><div class="lbl">Home Repair</div></div>
  <div class="cat"><div class="ico"><img src="../assets/categories/digital_software.png"/></div><div class="lbl">Digital</div></div>
  <div class="cat"><div class="ico"><img src="../assets/categories/creative_media.png"/></div><div class="lbl">Creative</div></div>
  <div class="cat"><div class="ico"><img src="../assets/categories/education.png"/></div><div class="lbl">Education</div></div>
  <div class="cat"><div class="ico"><img src="../assets/categories/cleaning.png"/></div><div class="lbl">Cleaning</div></div>
  <div class="cat"><div class="ico"><img src="../assets/categories/logistics.png"/></div><div class="lbl">Logistics</div></div>
  <div class="cat"><div class="ico"><img src="../assets/categories/care_health.png"/></div><div class="lbl">Care&nbsp;/&nbsp;Health</div></div>
  <div class="cat"><div class="ico"><img src="../assets/categories/professional_consulting.png"/></div><div class="lbl">Pro&nbsp;/&nbsp;Consult</div></div>
  <div class="cat"><div class="ico"><img src="../assets/categories/pets.png"/></div><div class="lbl">Pets</div></div>
  <div class="cat"><div class="ico"><img src="../assets/categories/events.png"/></div><div class="lbl">Events</div></div>
  <div class="cat"><div class="ico"><img src="../assets/categories/local_help.png"/></div><div class="lbl">Yardım</div></div>
  <div class="cat"><div class="ico"><img src="../assets/categories/announcement.png"/></div><div class="lbl">Duyuru</div></div>
  <div class="cat"><div class="ico"><img src="../assets/categories/work.png"/></div><div class="lbl">İş</div></div>
  <div class="cat"><div class="ico"><img src="../assets/categories/advisory.png"/></div><div class="lbl">Danışma</div></div>
  <div class="cat"><div class="ico"><img src="../assets/categories/megaphone.png"/></div><div class="lbl">Megaphone</div></div>
</div></body></html>
