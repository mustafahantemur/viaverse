<!doctype html>
<html><head><meta charset="utf-8"/><title>Type — Body & UI</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:var(--vv-bg);font-family:var(--vv-font-sans);color:var(--vv-fg);}
  .card{padding:24px 28px;display:flex;flex-direction:column;gap:12px;}
  .row{display:flex;align-items:baseline;gap:18px;}
  .label{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--vv-fg-muted);font-weight:700;width:88px;flex-shrink:0;}
  .a{font-size:15px;font-weight:500;color:var(--vv-fg);}
  .b{font-size:14px;font-weight:500;color:var(--vv-fg);}
  .c{font-size:12px;font-weight:500;color:var(--vv-fg);}
  .d{font-size:10px;font-weight:500;color:var(--vv-fg-muted);}
  .e{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.2em;color:var(--vv-fg-muted);}
  .price{font-family:var(--vv-font-display);font-size:28px;font-weight:800;color:var(--vv-trust-deep);letter-spacing:-0.02em;}
</style></head>
<body><div class="card">
  <div class="row"><div class="label">Body</div><div class="a">İhtiyacını anlat, hizmet verenlerden teklif al.</div></div>
  <div class="row"><div class="label">Body sm</div><div class="b">Yarın saat 14:00'da köpeğimi gezdirecek biri lazım.</div></div>
  <div class="row"><div class="label">Caption</div><div class="c">5m · 150m ötede</div></div>
  <div class="row"><div class="label">Micro</div><div class="d">Henüz yorum yapılmamış.</div></div>
  <div class="row"><div class="label">Eyebrow</div><div class="e">VEYA &nbsp;·&nbsp; HIZMET VEREN MODU</div></div>
  <div class="row"><div class="label">Price</div><div class="price">1.200 ₺</div></div>
</div></body></html>
